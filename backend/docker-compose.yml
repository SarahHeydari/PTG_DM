  db:
    image: postgis/postgis:16-3.4
    container_name: db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgis_data:/var/lib/postgresql/data
    networks:
      - backend

  minio:
    image: minio/minio:latest
    container_name: minio
    command: ["server", "/data", "--console-address", ":9001"]
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./minio_data:/data
    networks:
      - backend

  geoserver:
    image: kartoza/geoserver:2.24.0
    container_name: geoserver
    restart: always
    environment:
      # IMPORTANT:
      # kartoza/geoserver expects these env names (USERNAME, PASSWORD).
      # Keep your .env variables, but map them correctly:
      GEOSERVER_ADMIN_USERNAME: ${GEOSERVER_ADMIN_USER:-admin}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD:-geoserver}
      JAVA_OPTS: "-Xms1g -Xmx2g"
    ports:
      - "${GEOSERVER_PORT:-8084}:8080"
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
      - ./minio_data:/opt/minio_data:ro
    depends_on:
      - db
      - minio
    networks:
      - backend

  geoserver-styler:
    image: curlimages/curl:8.5.0
    container_name: geoserver-styler
    depends_on:
      - geoserver
    volumes:
      - ./geoserver_styles:/work:ro
    environment:
      GS: "http://geoserver:8080/geoserver"
      GS_USER: "${GEOSERVER_ADMIN_USER:-admin}"
      GS_PASS: "${GEOSERVER_ADMIN_PASSWORD:-geoserver}"
      GS_WORKSPACE: "fire"
    entrypoint: ["/bin/sh","-lc"]
    command: >
      "
      echo 'Waiting for GeoServer...';
      until curl -sS -u ${GEOSERVER_ADMIN_USER:-admin}:${GEOSERVER_ADMIN_PASSWORD:-geoserver} -f http://geoserver:8080/geoserver/rest/about/version.xml >/dev/null; do
        sleep 2;
      done;
      echo 'GeoServer ready. Applying styles...';
      /bin/sh /work/scripts/apply_styles.sh;
      echo 'DONE';
      "
    restart: "no"
    networks:
      - backend
  web:
    build: .
    container_name: web
    restart: always
    ports:
      - "${WEB_PORT:-8000}:8000"
    volumes:
      - .:/app
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      - db
      - minio
      - geoserver
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/ >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - backend

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./staticfiles:/staticfiles
      - ./media:/media
    depends_on:
      - web
    networks:
      - backend

volumes:
  postgis_data:
  geoserver_data:

networks:
  backend: